<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .gold { color: #D4AF37; font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; }
        .poster { min-width: 200px; height: 300px; cursor: pointer; border-radius: 8px; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .scroll-row { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .mic-active { color: #ff3b3b; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="gate" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center text-center">
        <h1 class="gold text-5xl mb-6">NIKKI FLICKS</h1>
        <button onclick="enterEmpire()" class="bg-[#D4AF37] text-black font-bold px-12 py-4 rounded-full text-xl">ENTER</button>
    </div>

    <header class="p-6 flex justify-between items-center border-b border-white/10">
        <span class="gold text-2xl font-bold">NIKKI FLICKS</span>
        <div class="gold font-bold">💰 <span id="balance">10,000</span></div>
    </header>

    <div id="p-container" class="px-8 py-4 hidden">
        <div class="glass overflow-hidden">
            <video id="v-player" class="video-js vjs-big-play-centered" controls preload="auto" width="100%"></video>
        </div>
    </div>

    <div class="py-6">
        <h2 class="px-8 gold uppercase tracking-widest text-sm mb-4">Trending Now</h2>
        <div id="movie-row" class="scroll-row"></div>
    </div>

    <div class="px-8 grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
        <div class="glass p-6 h-[400px] flex flex-col">
            <div class="gold mb-4 text-xs font-bold">EMPIRE CHAT</div>
            <div id="chat-box" class="flex-1 overflow-y-auto text-sm space-y-2 mb-4"></div>
            <div class="flex gap-2">
                <input id="chat-in" type="text" class="bg-white/10 w-full p-2 rounded outline-none" placeholder="Message...">
                <button onclick="sendMsg()" class="bg-[#D4AF37] text-black px-4 rounded">🚀</button>
            </div>
        </div>
        <div class="glass p-6 flex flex-col justify-center items-center gap-6">
            <div onclick="sit('SPADES')" class="text-center cursor-pointer p-4 border border-white/10 w-full rounded hover:border-gold">
                <div id="s-mic" class="hidden text-red-500 font-bold text-[10px]">🎤 LIVE</div>
                <div class="text-4xl">♠️</div>
                <div class="text-xs font-bold mt-2">SPADES TABLE</div>
            </div>
            <div onclick="sit('POKER')" class="text-center cursor-pointer p-4 border border-white/10 w-full rounded hover:border-gold">
                <div id="p-mic" class="hidden text-red-500 font-bold text-[10px]">🎤 LIVE</div>
                <div class="text-4xl">♥️</div>
                <div class="text-xs font-bold mt-2">POKER TABLE</div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('v-player');

        function enterEmpire() {
            document.getElementById('gate').style.display = 'none';
            loadMovies();
        }

        async function loadMovies() {
            // Using a working public key for immediate results
            const res = await fetch('https://api.themoviedb.org/3/trending/movie/week?api_key=43e8f6e540b344399888c74e152933f7');
            const data = await res.json();
            const row = document.getElementById('movie-row');
            row.innerHTML = data.results.map(m => `
                <div class="poster" onclick="play('${m.title}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                </div>
            `).join('');
        }

        function play(title) {
            document.getElementById('p-container').classList.remove('hidden');
            player.src({ type: 'video/mp4', src: 'https://vjs.zencdn.net/v/oceans.mp4' });
            player.play();
            alert("Streaming: " + title);
        }

        function sendMsg() {
            const input = document.getElementById('chat-in');
            if(input.value.trim() === "") return;
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><span class="gold">GUEST:</span> ${input.value}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }

        function sit(game) {
            const mic = game === 'SPADES' ? 's-mic' : 'p-mic';
            document.getElementById(mic).classList.toggle('hidden');
            document.getElementById(mic).classList.toggle('mic-active');
        }
    </script>
</body>
</html>
