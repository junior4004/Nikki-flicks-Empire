
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKI FLICKS EMPIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; margin: 0; }
        .gold-title { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .grid-box { background: linear-gradient(#222, #050505); border: 2px solid #D4AF37; border-radius: 15px; padding: 25px; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        .menu-item { background: #111; border-bottom: 1px solid #333; padding: 20px; text-align: left; width: 100%; color: #fff; font-weight: bold; display: block; }
    </style>
</head>
<body class="p-4">

    <header class="mb-10">
        <h1 class="gold-title text-4xl font-bold uppercase">Nikki Flicks</h1>
        <p class="text-[11px] tracking-[0.5em] text-gray-400 mt-2 font-bold">WOODLAND • CALIFORNIA</p>
    </header>

    <div class="grid grid-cols-2 gap-6 max-w-md mx-auto">
        <div class="grid-box" onclick="openOverlay('tv-menu')">
            <div class="text-4xl">📺</div><div class="text-[11px] mt-3 font-black uppercase text-blue-400">Live TV</div>
        </div>
        <div class="grid-box" onclick="openOverlay('theater-menu')">
            <div class="text-4xl">🎬</div><div class="text-[11px] mt-3 font-black uppercase text-red-500">Theater</div>
        </div>
        <div class="grid-box" onclick="openOverlay('radio-menu')">
            <div class="text-4xl">📻</div><div class="text-[11px] mt-3 font-black uppercase text-green-500">Radio</div>
        </div>
        <div class="grid-box" onclick="openOverlay('card-view')">
            <div class="text-4xl">🃏</div><div class="text-[11px] mt-3 font-black uppercase text-white">Card Room</div>
        </div>
    </div>

    <div id="tv-menu" class="overlay p-6 overflow-y-auto">
        <h2 class="gold-title text-2xl mb-8">SELECT STATION</h2>
        <div class="max-w-sm mx-auto space-y-4">
            <a href="https://www.youtube.com/user/ABCNews/live" target="_blank" class="menu-item">📡 ABC NEWS LIVE</a>
            <a href="https://www.youtube.com/@NBCNews/live" target="_blank" class="menu-item">📡 NBC NEWS NOW</a>
            <button onclick="closeAll()" class="mt-12 text-gray-500 font-bold uppercase underline">Back</button>
        </div>
    </div>

    <div id="radio-menu" class="overlay p-6">
        <h2 class="gold-title text-2xl mb-8">WOODLAND RADIO</h2>
        <div class="max-w-sm mx-auto space-y-4">
            <a href="https://tunein.com/radio/Woodland-r101255/" target="_blank" class="menu-item">📻 LOCAL RADIO</a>
            <button onclick="closeAll()" class="mt-12 text-gray-500 font-bold uppercase underline">Back</button>
        </div>
    </div>

    <div id="theater-menu" class="overlay p-8"><h2>THEATER</h2><button onclick="closeAll()">BACK</button></div>
    <div id="card-view" class="overlay p-8"><h2>CARD ROOM</h2><button onclick="closeAll()">BACK</button></div>

    <script>
        function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function closeAll() { document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'); }
    </script>
</body>
</html>
