<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>NIKKI FLICKS | The Shot Caller Experience</title>
   <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
   <style>
       :root {
           --deep-purple: #1a0a2e;
           --royal-purple: #2d1b4e;
           --shimmer-gold: #d4af37;
           --bright-gold: #ffd700;
           --onyx-black: #0d0d0d;
           --rich-black: #050505;
           --danger-red: #dc143c;
       }

       * { margin: 0; padding: 0; box-sizing: border-box; }
       body { font-family: 'Inter', sans-serif; background: var(--rich-black); color: #fff; overflow-x: hidden; }

       /* AGE GATE */
       #age-gate { position: fixed; inset: 0; background: linear-gradient(135deg, var(--deep-purple), var(--onyx-black)); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; }
       .age-gate-content { max-width: 600px; border: 3px solid var(--shimmer-gold); padding: 3rem; background: rgba(0,0,0,0.9); box-shadow: 0 0 50px rgba(212,175,55,0.3); }
       .age-gate-logo { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; background: linear-gradient(45deg, var(--shimmer-gold), var(--bright-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
       .age-warning { font-size: 4rem; color: var(--danger-red); text-shadow: 0 0 20px var(--danger-red); font-weight: 900; }
       .age-btn { background: var(--shimmer-gold); color: #000; padding: 1.2rem 3rem; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; cursor: pointer; border: none; margin-top: 2rem; border-radius: 5px; }

       /* MAIN LOBBY */
       #main-lobby { display: none; min-height: 100vh; }
       .lobby-header { background: #111; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--shimmer-gold); position: sticky; top: 0; z-index: 100; }
       
       /* NETFLIX SECTION */
       .section-title { padding: 20px 20px 10px; font-family: 'Playfair Display', serif; color: var(--shimmer-gold); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
       .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scrollbar-width: none; }
       .netflix-row::-webkit-scrollbar { display: none; }
       .poster { min-width: 150px; height: 220px; background: #222; border: 1px solid #333; border-radius: 8px; flex-shrink: 0; transition: 0.3s; overflow: hidden; }
       .poster img { width: 100%; height: 100%; object-fit: cover; }
       .poster:active { transform: scale(1.05); border-color: var(--shimmer-gold); }

       /* CARD ROOM */
       .casino-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
       .casino-card { background: linear-gradient(135deg, var(--royal-purple), #000); border: 2px solid var(--shimmer-gold); padding: 25px; border-radius: 12px; text-align: center; font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
       .chip-display { color: var(--bright-gold); font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
   </style>
</head>
<body>

   <div id="age-gate">

           <div class="age-gate-logo">NIKKI FLICKS</div>
           <div class="age-warning">18+</div>
           <p style="color: var(--pale-gold); margin-top: 15px; font-weight: 600;">THE SHOT CALLER EXPERIENCE</p>
           <button class="age-btn" onclick="enterEmpire()">ENTER EMPIRE</button>
       </div>
   </div>

   <div id="main-lobby">

           <div class="age-gate-logo" style="font-size: 1.4rem; margin: 0;">NIKKI FLICKS</div>
           <div class="chip-display">
               <span>💰</span><span>10,000</span>
           </div>
       </header>

       <h2 class="section-title">Empire Theater</h2>
       <div class="netflix-row">
           <div class="poster"><img src="https://images.unsplash.com/photo-1594908900066-3f47337549d8?auto=format&fit=crop&w=300&q=80"></div>
           <div class="poster"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=300&q=80"></div>
           <div class="poster"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=300&q=80"></div>
           <div class="poster"><img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=300&q=80"></div>
       </div>

       <h2 class="section-title">The Card Room</h2>
       <div class="casino-gri
           <div class="casino-card" onclick="alert('Spades Table Joining...')">🃏<br>SPADES</div>
           <div class="casino-card" onclick="alert('Poker Table Joining...')">🃏<br>POKER</div>
           <div class="casino-card" onclick="alert('Texas Hold\'em Joining...')">🃏<br>TEXAS HOLD'EM</div>
           <div class="casino-card" onclick="alert('Pinochle Joining...')">🃏<br>PINOCHLE</div>
       </div>

       <button class="age-btn" style="width: 90%; margin: 20px 5%; background: var(--danger-red); color: #fff; font-size: 1rem;">WATCH AD FOR +500 CHIPS</button>
   </div>

   <script>
       function enterEmpire() {
           document.getElementById('age-gate').style.display = 'none';
           document.getElementById('main-lobby').style.display = 'block';
           window.scrollTo(0,0);
       }
   </script>
</body
